<!DOCTYPE html>
<html>
<head>
<title>A surprise for you ❤️</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#ff9ecf,#ffd6e7);
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

/* floating hearts */

.heart{
position:absolute;
font-size:20px;
animation:float 6s linear infinite;
opacity:0.8;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

/* glass card */

.card{
backdrop-filter:blur(12px);
background:rgba(255,255,255,0.2);
border-radius:20px;
padding:30px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
max-width:320px;
}

/* buttons */

button{
padding:12px 22px;
border:none;
border-radius:10px;
font-size:18px;
margin:10px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.1);
}

#yes{
background:#ff4d94;
color:white;
}

#no{
background:#ddd;
}

#startBtn{
background:white;
color:#ff4d94;
}

/* photo */

img{
width:260px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
animation:zoom 6s infinite alternate;
}

@keyframes zoom{
from{transform:scale(1)}
to{transform:scale(1.1)}
}

#carousel{
display:none;
}

#message{
margin-top:15px;
font-size:18px;
}

#final{
display:none;
font-size:24px;
margin-top:15px;
}

</style>
</head>

<body>

<div id="hearts"></div>

<div class="card" id="start">
<h2>Hey Minenhle ❤️</h2>
<p>I made something for you</p>
<button id="startBtn" onclick="showQuestion()">Tap to start</button>
</div>

<div class="card" id="question" style="display:none;">
<h3>Do you love me? 😌</h3>
<button id="yes" onclick="startExperience()">Yes ❤️</button>
<button id="no" onclick="moveNo()">No</button>
</div>

<div class="card" id="carousel">
<img id="photo" src="photo1.jpg">
<div id="message"></div>
<div id="final">Text me when you see this ❤️</div>
</div>

<script>

/* floating hearts */

for(let i=0;i<25;i++){
let heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="❤️"
heart.style.left=Math.random()*100+"vw"
heart.style.animationDuration=(4+Math.random()*4)+"s"
document.body.appendChild(heart)
}

/* show question */

function showQuestion(){
document.getElementById("start").style.display="none"
document.getElementById("question").style.display="block"
}

/* moving no button */

function moveNo(){
let btn=document.getElementById("no")
btn.style.position="absolute"
btn.style.left=Math.random()*300+"px"
btn.style.top=Math.random()*300+"px"
}

/* photos */

let photos=[
"photo1.jpg",
"photo2.jpg",
"photo3.jpg",
"photo4.jpg",
"photo5.jpg"
]

let index=0

/* typewriter message */

let text="I'm really glad I met you that day. You make me smile more than you know."
let i=0

function typeWriter(){
if(i < text.length){
document.getElementById("message").innerHTML += text.charAt(i)
i++
setTimeout(typeWriter,50)
}
}

/* confetti */

function confetti(){
for(let i=0;i<40;i++){
let c=document.createElement("div")
c.innerHTML="🎉"
c.style.position="absolute"
c.style.left=Math.random()*100+"vw"
c.style.top=Math.random()*100+"vh"
document.body.appendChild(c)
}
}

/* start experience */

function startExperience(){

document.getElementById("question").style.display="none"
document.getElementById("carousel").style.display="block"

confetti()

typeWriter()

}

/* swipe photos */

let startX=0

document.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

document.addEventListener("touchend",e=>{
let endX=e.changedTouches[0].clientX

if(endX < startX){
index++
}else{
index--
}

if(index < 0) index=photos.length-1
if(index >= photos.length) index=0

document.getElementById("photo").src=photos[index]
})

/* final reveal */

setTimeout(()=>{
document.getElementById("final").style.display="block"
},12000)

</script>

</body>
</html>
